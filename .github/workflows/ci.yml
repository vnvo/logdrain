name: CI

on:
  push:
    branches: [main, master]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  test:
    name: test + lint (stable)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: rustfmt
        run: cargo fmt --all --check
      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: test
        run: cargo test --workspace

  msrv:
    name: build (MSRV 1.85)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.85.0
      - uses: Swatinem/rust-cache@v2
      - name: build
        run: cargo build --workspace

  features:
    name: optional backends (redis + kafka)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: install librdkafka build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake pkg-config \
            libssl-dev libsasl2-dev libzstd-dev zlib1g-dev libcurl4-openssl-dev
      - name: clippy (redis + kafka)
        run: cargo clippy -p logdrain --features redis,kafka --all-targets -- -D warnings
      - name: test (redis + kafka; broker tests are #[ignore])
        run: cargo test -p logdrain --features redis,kafka
