name: Release

# Publishes to crates.io and creates a GitHub Release when a version tag is pushed:
#   cargo set-version / bump Cargo.toml versions, then:
#   git tag v0.2.0 && git push origin v0.2.0
#
# Requires a repo secret `CARGO_REGISTRY_TOKEN` (a crates.io API token).
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write # for creating the GitHub Release

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: publish ${{ github.ref_name }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2

      - name: Check tag matches crate version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          crate="$(grep -m1 '^version = ' crates/logdrain/Cargo.toml | cut -d'"' -f2)"
          echo "tag=$tag crate=$crate"
          if [ "$tag" != "$crate" ]; then
            echo "::error::tag v$tag does not match logdrain crate version $crate"
            exit 1
          fi

      - name: Verify before publishing
        run: |
          cargo fmt --all --check
          cargo clippy --workspace --all-targets -- -D warnings
          cargo test --workspace

      # The library must be published before the CLI, which depends on it.
      # `cargo publish` waits for the new version to be indexed before returning.
      # Each step is idempotent: a version already on crates.io is skipped, so
      # re-running a release (or tagging an already-published version) is safe.
      - name: Publish logdrain
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          ver=$(grep -m1 '^version = ' crates/logdrain/Cargo.toml | cut -d'"' -f2)
          code=$(curl -sL -o /dev/null -w "%{http_code}" \
            -H "User-Agent: logdrain-release (github.com/vnvo)" \
            "https://crates.io/api/v1/crates/logdrain/$ver")
          if [ "$code" = "200" ]; then
            echo "logdrain $ver already on crates.io - skipping"
          else
            cargo publish -p logdrain
          fi

      - name: Publish logdrain-cli
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          ver=$(grep -m1 '^version = ' crates/logdrain-cli/Cargo.toml | cut -d'"' -f2)
          code=$(curl -sL -o /dev/null -w "%{http_code}" \
            -H "User-Agent: logdrain-release (github.com/vnvo)" \
            "https://crates.io/api/v1/crates/logdrain-cli/$ver")
          if [ "$code" = "200" ]; then
            echo "logdrain-cli $ver already on crates.io - skipping"
          else
            cargo publish -p logdrain-cli
          fi

      - name: Create GitHub Release
        run: gh release create "${{ github.ref_name }}" --generate-notes --verify-tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
